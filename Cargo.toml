[workspace]
members = [
    "core",
    "packages/sdk-rust",
]
resolver = "2"

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = "deny"
# Prefer passing a method path (e.g. `str::to_owned`) over a closure that only
# forwards its argument to a method call (e.g. `|s| s.to_owned()`).
redundant_closure_for_method_calls = "deny"
