[workspace]
members = [
    "core",
    "packages/sdk-rust",
]
resolver = "2"

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
# Prefer `map_or`/`map_or_else` over `map(..).unwrap_or(..)`/`map(..).unwrap_or_else(..)`:
# one allocation-free combinator instead of two chained calls — clearer and harder to misread.
map_unwrap_or = "deny"
