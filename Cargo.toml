[workspace]
members = [
    "core",
    "packages/sdk-rust",
]
resolver = "2"

[workspace.lints.rust]
warnings = "deny"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
# Require an explicit trailing `;` on unit-returning statements so a block's
# final expression unambiguously signals whether it yields a value.
semicolon_if_nothing_returned = "deny"
